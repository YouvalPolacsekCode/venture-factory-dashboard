<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Venture Factory — Status</title>
<!-- Single self-contained page. Reads ./data.json (same folder). Read-only,
     no storage, no mutation. Chart.js is the ONLY external dependency and only
     via this one CDN. Every section degrades gracefully on missing data. -->
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1d212b; --line: #2a2f3a;
    --ink: #e8eaed; --muted: #9aa3b0; --accent: #5b8cff;
    --good: #3fb950; --warn: #d29922; --bad: #f85149; --chip: #232834;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 18px 64px; }
  header.top { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 14px; margin-bottom: 6px; }
  header.top h1 { font-size: 22px; margin: 0; letter-spacing: .2px; }
  .sub { color: var(--muted); font-size: 13px; }
  .sub .dot { color: var(--good); }
  h2 { font-size: 14px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin: 0 0 12px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 18px; margin-top: 18px; }
  .grid { display: grid; gap: 18px; }
  @media (min-width: 760px) { .grid.two { grid-template-columns: 1fr 1fr; } }

  /* funnel */
  .funnel { display: flex; flex-wrap: wrap; gap: 10px; }
  .stage { flex: 1 1 120px; background: var(--panel2); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; }
  .stage .n { font-size: 26px; font-weight: 700; }
  .stage .l { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .stage .arrow { color: var(--muted); }

  /* approvals */
  .approval { border-left: 3px solid var(--warn); background: var(--panel2); border-radius: 0 8px 8px 0; padding: 10px 12px; margin-bottom: 10px; }
  .approval.expiring { border-left-color: var(--bad); }
  .approval .at { font-weight: 600; }
  .approval .meta { color: var(--muted); font-size: 12.5px; margin-top: 2px; }
  .empty { color: var(--muted); font-style: italic; }

  /* tables */
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
  th { color: var(--muted); font-weight: 600; cursor: pointer; user-select: none; white-space: nowrap; }
  th .ind { opacity: .5; font-size: 11px; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  tbody tr:hover { background: var(--panel2); }

  .chip { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 12px; background: var(--chip); color: var(--ink); border: 1px solid var(--line); }
  .chip.validate, .chip.validated { color: var(--good); border-color: #1f5e2b; }
  .chip.drop, .chip.rejected, .chip.killed { color: var(--bad); border-color: #5e2424; }
  .chip.build, .chip.scale, .chip.launched { color: var(--accent); border-color: #25406e; }

  .cards { display: flex; flex-wrap: wrap; gap: 14px; }
  .card { flex: 1 1 110px; background: var(--panel2); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; }
  .card .v { font-size: 22px; font-weight: 700; }
  .card .k { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

  /* activity heatmap */
  .heat { overflow-x: auto; }
  .heat table td, .heat table th { border-bottom: none; padding: 3px 6px; font-size: 12px; }
  .cell { display: inline-block; width: 18px; height: 18px; border-radius: 4px; background: var(--panel2); border: 1px solid var(--line); text-align: center; line-height: 18px; font-size: 11px; }
  .cell.ok { background: #16341d; border-color: #1f5e2b; color: #7ee08a; }
  .cell.skip { background: #2a2f3a; color: var(--muted); }
  .cell.wait { background: #3a3015; border-color: #6b5410; color: #e3b341; }
  .cell.err { background: #3a1c1c; border-color: #5e2424; color: #ff9a92; }

  pre.report { white-space: pre-wrap; word-wrap: break-word; background: var(--panel2); border: 1px solid var(--line); border-radius: 8px; padding: 14px; font: 13px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace; color: #cdd3dd; max-height: 460px; overflow: auto; }
  .foot { color: var(--muted); font-size: 12px; margin-top: 26px; text-align: center; }
  .err-banner { background: #3a1c1c; border: 1px solid #5e2424; color: #ff9a92; padding: 12px 14px; border-radius: 10px; margin-top: 18px; }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>Venture Factory</h1>
    <span class="sub" id="updated">loading…</span>
    <span class="sub"><span class="dot">●</span> auto-updates daily</span>
  </header>

  <div id="error" class="err-banner" style="display:none"></div>

  <section class="panel">
    <h2>Pipeline</h2>
    <div class="funnel" id="funnel"></div>
  </section>

  <section class="panel">
    <h2>Action needed</h2>
    <div id="approvals"></div>
  </section>

  <section class="panel">
    <h2>Top opportunities</h2>
    <div id="opps"></div>
  </section>

  <div class="grid two">
    <section class="panel">
      <h2>Active services</h2>
      <div id="services"></div>
    </section>
    <section class="panel">
      <h2>Spend</h2>
      <div class="cards" id="spendcards"></div>
      <canvas id="spendchart" height="150" style="margin-top:14px"></canvas>
    </section>
  </div>

  <section class="panel">
    <h2>Activity — last 7 days</h2>
    <div class="heat" id="activity"></div>
  </section>

  <section class="panel">
    <h2>Latest daily report</h2>
    <div id="report"></div>
  </section>

  <div class="foot" id="foot"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, c =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const num = (n) => (n == null || isNaN(n)) ? "—" : Number(n).toLocaleString();
const usd = (n) => (n == null || isNaN(n)) ? "—" : "$" + Number(n).toFixed(n >= 1 ? 2 : 4);

function showError(msg) {
  const e = $("error");
  e.style.display = "block";
  e.textContent = msg;
}

function renderUpdated(d) {
  const g = d.generated_at || {};
  const idt = g.idt ? g.idt.replace("T", " ").slice(0, 16) : "unknown";
  $("updated").textContent = "updated " + idt + " IDT";
}

function renderFunnel(d) {
  const f = d.funnel || {};
  const stages = [
    ["Candidates", f.candidates],
    ["Scored", f.scored],
    ["Validated", f.validated],
    ["Build now", f.build_now],
    ["Services", f.services_scaffolded],
    ["Launched", f.services_launched],
  ];
  const el = $("funnel");
  el.innerHTML = "";
  stages.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "stage";
    div.innerHTML = `<div class="n">${num(s[1] || 0)}</div><div class="l">${esc(s[0])}</div>`;
    el.appendChild(div);
    if (i < stages.length - 1) {
      const a = document.createElement("div");
      a.className = "stage arrow";
      a.style.cssText = "flex:0 0 auto;border:none;background:none;display:flex;align-items:center;padding:0 2px";
      a.textContent = "→";
      el.appendChild(a);
    }
  });
}

function renderApprovals(d) {
  const items = d.approvals || [];
  const el = $("approvals");
  if (!items.length) { el.innerHTML = '<div class="empty">Nothing waiting on you. ✔</div>'; return; }
  el.innerHTML = "";
  items.forEach(a => {
    const div = document.createElement("div");
    const age = a.age_hours;
    const expiringSoon = age != null && age >= 18;
    div.className = "approval" + (expiringSoon ? " expiring" : "");
    const bits = [];
    if (a.agent) bits.push(esc(a.agent));
    if (age != null) bits.push(age + "h old");
    if (a.expires_at) bits.push("expires " + esc(String(a.expires_at).replace("T", " ").slice(0, 16)));
    if (a.cost_estimate_usd != null) bits.push(usd(a.cost_estimate_usd));
    div.innerHTML = `<div class="at">${esc(a.action_type || "action")}</div>`
      + `<div>${esc(a.summary || "")}</div>`
      + `<div class="meta">${bits.join(" · ")}</div>`;
    el.appendChild(div);
  });
}

let oppState = { col: "total", dir: -1 };
function renderOpps(d) {
  const rows = d.top_opportunities || [];
  const el = $("opps");
  if (!rows.length) { el.innerHTML = '<div class="empty">No scored opportunities yet.</div>'; return; }
  const cols = [
    ["problem_statement", "Problem", false],
    ["target_segment", "Segment", false],
    ["total", "Score", true],
    ["recommended_stage", "Stage", false],
    ["verdict", "Verdict", false],
  ];
  const sorted = rows.slice().sort((a, b) => {
    let x = a[oppState.col], y = b[oppState.col];
    if (x == null) x = oppState.col === "total" ? -Infinity : "";
    if (y == null) y = oppState.col === "total" ? -Infinity : "";
    if (typeof x === "number" && typeof y === "number") return (x - y) * oppState.dir;
    return String(x).localeCompare(String(y)) * oppState.dir;
  });
  let html = "<table><thead><tr>";
  cols.forEach(c => {
    const ind = oppState.col === c[0] ? (oppState.dir < 0 ? " ▼" : " ▲") : "";
    html += `<th class="${c[2] ? "num" : ""}" data-col="${c[0]}">${esc(c[1])}<span class="ind">${ind}</span></th>`;
  });
  html += "</tr></thead><tbody>";
  sorted.forEach(o => {
    const stage = o.recommended_stage || "";
    const verdict = o.verdict || "";
    const prob = o.source_url
      ? `<a href="${esc(o.source_url)}" target="_blank" rel="noopener noreferrer">${esc(o.problem_statement)}</a>`
      : esc(o.problem_statement);
    html += "<tr>"
      + `<td>${prob}</td>`
      + `<td>${esc(o.target_segment)}</td>`
      + `<td class="num">${o.total == null ? "—" : Number(o.total).toFixed(1)}</td>`
      + `<td>${stage ? `<span class="chip ${esc(stage)}">${esc(stage)}</span>` : "—"}</td>`
      + `<td>${verdict ? `<span class="chip ${esc(verdict)}">${esc(verdict)}</span>` : "—"}</td>`
      + "</tr>";
  });
  html += "</tbody></table>";
  el.innerHTML = html;
  el.querySelectorAll("th").forEach(th => th.addEventListener("click", () => {
    const col = th.getAttribute("data-col");
    if (oppState.col === col) oppState.dir *= -1;
    else { oppState.col = col; oppState.dir = (col === "total") ? -1 : 1; }
    renderOpps(d);
  }));
}

function renderServices(d) {
  const items = d.services || [];
  const el = $("services");
  if (!items.length) { el.innerHTML = '<div class="empty">No services yet — discovery phase.</div>'; return; }
  let html = "<table><thead><tr><th>Service</th><th>Stage</th><th>Last signal</th></tr></thead><tbody>";
  items.forEach(s => {
    const stage = s.current_stage || "";
    html += "<tr>"
      + `<td>${esc(s.slug)}</td>`
      + `<td>${stage ? `<span class="chip ${esc(stage)}">${esc(stage)}</span>` : "—"}</td>`
      + `<td>${esc(s.last_signal || "—")}</td>`
      + "</tr>";
  });
  html += "</tbody></table>";
  el.innerHTML = html;
}

function renderSpend(d) {
  const s = d.spend || {};
  $("spendcards").innerHTML = [
    ["Today", usd(s.today_usd)],
    ["7-day", usd(s.last_7_days_usd)],
    ["All-time", usd(s.all_time_usd)],
  ].map(c => `<div class="card"><div class="v">${c[1]}</div><div class="k">${c[0]}</div></div>`).join("");

  const byDay = s.by_day || [];
  const ctx = $("spendchart");
  if (!byDay.length || typeof Chart === "undefined") {
    if (ctx) ctx.style.display = "none";
    return;
  }
  new Chart(ctx, {
    type: "bar",
    data: {
      labels: byDay.map(x => (x.date || "").slice(5)),
      datasets: [{ label: "USD / day", data: byDay.map(x => x.usd), backgroundColor: "#5b8cff" }],
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: "#9aa3b0" }, grid: { display: false } },
        y: { ticks: { color: "#9aa3b0" }, grid: { color: "#2a2f3a" }, beginAtZero: true },
      },
    },
  });
}

function classifyStatus(statuses) {
  // statuses: { succeeded: n, skipped: n, awaiting_approval: n, ... }
  if (statuses.failed || statuses.error) return ["err", "✕"];
  if (statuses.awaiting_approval) return ["wait", "⏳"];
  if (statuses.succeeded) return ["ok", String(statuses.succeeded)];
  if (statuses.skipped || statuses.no_op) return ["skip", "–"];
  const total = Object.values(statuses).reduce((a, b) => a + b, 0);
  return total ? ["ok", String(total)] : ["", ""];
}

function renderActivity(d) {
  const days = d.activity || [];
  const el = $("activity");
  const agents = new Set();
  days.forEach(day => Object.keys(day.agents || {}).forEach(a => agents.add(a)));
  if (!agents.size) { el.innerHTML = '<div class="empty">No runs logged in the last 7 days.</div>'; return; }
  const agentList = Array.from(agents).sort();
  let html = "<table><thead><tr><th>Agent</th>";
  days.forEach(day => html += `<th style="text-align:center">${esc((day.date || "").slice(5))}</th>`);
  html += "</tr></thead><tbody>";
  agentList.forEach(agent => {
    html += `<tr><td>${esc(agent)}</td>`;
    days.forEach(day => {
      const st = (day.agents || {})[agent];
      if (!st) { html += '<td style="text-align:center"><span class="cell"></span></td>'; return; }
      const [cls, label] = classifyStatus(st);
      const title = Object.entries(st).map(([k, v]) => `${k}: ${v}`).join(", ");
      html += `<td style="text-align:center"><span class="cell ${cls}" title="${esc(title)}">${esc(label)}</span></td>`;
    });
    html += "</tr>";
  });
  html += "</tbody></table>";
  el.innerHTML = html;
}

function renderReport(d) {
  const r = d.latest_report_excerpt;
  const el = $("report");
  if (!r || !r.text) { el.innerHTML = '<div class="empty">No daily report yet.</div>'; return; }
  el.innerHTML = `<div class="sub" style="margin-bottom:8px">${esc(r.file)}</div>`
    + `<pre class="report">${esc(r.text)}${r.truncated ? "\n\n… (truncated — see full report in repo)" : ""}</pre>`;
}

fetch("./data.json", { cache: "no-store" })
  .then(res => { if (!res.ok) throw new Error("HTTP " + res.status); return res.json(); })
  .then(d => {
    renderUpdated(d);
    [renderFunnel, renderApprovals, renderOpps, renderServices, renderSpend, renderActivity, renderReport]
      .forEach(fn => { try { fn(d); } catch (e) { console.error(fn.name, e); } });
    $("foot").textContent = "Static read-only snapshot · sanitized export · regenerated by the daily run.";
  })
  .catch(err => {
    showError("Could not load data.json (" + err.message + "). If this is a fresh deploy, the daily run may not have published data yet.");
    $("updated").textContent = "no data";
  });
</script>
</body>
</html>
